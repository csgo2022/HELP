server:
  port: 8080

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/mutual_aid1?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai
    username: root
    password: 123456
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQLDialect
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  servlet:
    multipart:
      enabled: true
      max-file-size: 5MB
      max-request-size: 10MB

aliyun:
  oss:
    endpoint: oss-cn-beijing.aliyuncs.com
    access-key-id: ${ALIYUN_ACCESS_KEY_ID:your-access-key-id}
    access-key-secret: ${ALIYUN_ACCESS_KEY_SECRET:your-access-key-secret}
    bucket-name: bgh123
  ocr:
    endpoint: ocr.cn-beijing.aliyuncs.com

jwt:
  secret: ${JWT_SECRET:your-jwt-secret}
  access-token-expiration: 604800000
  refresh-token-expiration: 2592000000

kuaidi100:
  key: ${KUAIDI100_KEY:your-kuaidi100-key}
  customer: ${KUAIDI100_CUSTOMER:your-kuaidi100-customer}
  query-url: https://poll.kuaidi100.com/poll/maptrack.do
  cache-minutes: 1

deepseek:
  api-key: ${DEEPSEEK_API_KEY:your-deepseek-api-key}
  api-url: https://api.deepseek.com/chat/completions
  model: deepseek-chat
